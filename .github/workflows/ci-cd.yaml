name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  EKS_CLUSTER: ocr-platform-prod
  K8S_NAMESPACE: ocr-platform

permissions:
  id-token: write
  contents: read

jobs:
  # ── Security Scan ────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python security scan (Bandit)
        uses: PyCQA/bandit-action@v1
        with:
          targets: services/
          severity: medium
          confidence: medium

      - name: Container image scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH

      - name: SAST scan (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python p/javascript p/typescript

  # ── Test ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - ingestion-service
          - quota-service
          - ocr-worker
          - result-service
          - notification-service
          - chat-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short || echo "No tests found"

  # ── Build & Push Docker Images ───────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [security, test]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-service
          - ingestion-service
          - quota-service
          - ocr-worker
          - result-service
          - notification-service
          - chat-service
          - admin-service
          - web-app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ matrix.service }}
          TAG=${{ github.sha }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest services/${{ matrix.service }}
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

  # ── Deploy to EKS ───────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply K8s manifests
        run: |
          # Replace image placeholders with actual ECR registry
          sed -i "s|\${ECR_REGISTRY}|${{ env.ECR_REGISTRY }}|g" infrastructure/k8s/deployments.yaml

          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/rbac.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml
          kubectl apply -f infrastructure/k8s/network-policies.yaml
          kubectl apply -f infrastructure/k8s/cert-manager.yaml
          kubectl apply -f infrastructure/k8s/deployments.yaml
          kubectl apply -f infrastructure/k8s/keda-scaledobject.yaml
          kubectl apply -f infrastructure/k8s/ingress.yaml

      - name: Rolling restart all services
        run: |
          for svc in auth-service ingestion-service quota-service result-service notification-service chat-service ocr-worker admin-service web-app; do
            kubectl rollout restart deployment/$svc -n ${{ env.K8S_NAMESPACE }} || true
          done

      - name: Wait for rollout
        run: |
          for svc in auth-service ingestion-service quota-service result-service chat-service web-app; do
            kubectl rollout status deployment/$svc -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          done
