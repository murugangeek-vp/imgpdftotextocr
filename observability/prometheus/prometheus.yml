global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "quota-service"
    static_configs:
      - targets: ["quota-service:8003"]
    metrics_path: /metrics

  - job_name: "ingestion-service"
    static_configs:
      - targets: ["ingestion-service:8002"]
    metrics_path: /metrics

  - job_name: "result-service"
    static_configs:
      - targets: ["result-service:8004"]
    metrics_path: /metrics

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:8005"]
    metrics_path: /metrics

  - job_name: "chat-service"
    static_configs:
      - targets: ["chat-service:8006"]
    metrics_path: /metrics

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8001"]
    metrics_path: /metrics

  - job_name: "triton"
    static_configs:
      - targets: ["triton:8002"]
    metrics_path: /metrics
