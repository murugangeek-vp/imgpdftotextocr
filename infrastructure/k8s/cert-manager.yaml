# cert-manager ClusterIssuer (Let's Encrypt) + Certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@ocrplatform.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: kong

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ocr-platform-tls
  namespace: ocr-platform
spec:
  secretName: ocr-platform-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ocrplatform.com
    - api.ocrplatform.com
    - admin.ocrplatform.com
