# ── web-app (Next.js) ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: ocr-platform
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      serviceAccountName: ocr-service-sa
      containers:
        - name: web-app
          image: ${ECR_REGISTRY}/web-app:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.ocrplatform.com"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: ocr-platform
spec:
  selector:
    app: web-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
