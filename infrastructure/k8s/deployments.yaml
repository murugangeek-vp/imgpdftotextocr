# ── ocr-worker (Kafka consumer — KEDA scaled) ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
  namespace: ocr-platform
  labels:
    app: ocr-worker
spec:
  replicas: 1  # KEDA manages scaling, baseline 0-1
  selector:
    matchLabels:
      app: ocr-worker
  template:
    metadata:
      labels:
        app: ocr-worker
    spec:
      serviceAccountName: ocr-service-sa
      containers:
        - name: ocr-worker
          image: ${ECR_REGISTRY}/ocr-worker:latest
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          # No HTTP port — this is a Kafka consumer, not a web server.
          # Health is monitored via Kafka consumer lag by KEDA.

---
# ── triton-server (GPU workload) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton
  namespace: ocr-platform
  labels:
    app: triton
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton
  template:
    metadata:
      labels:
        app: triton
    spec:
      serviceAccountName: ocr-service-sa
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        node.kubernetes.io/instance-type: g5.xlarge
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.01-py3
          args: ["tritonserver", "--model-repository=/models", "--strict-model-config=false"]
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: metrics
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 4000m
              memory: 8Gi
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-store
              mountPath: /models
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: triton-model-store
---
apiVersion: v1
kind: Service
metadata:
  name: triton
  namespace: ocr-platform
spec:
  selector:
    app: triton
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 8002
      targetPort: 8002

