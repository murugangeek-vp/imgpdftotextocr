# ============================================================
# NetworkPolicy: deny-all default + per-service whitelists
# ============================================================

# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: ocr-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: ocr-platform
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Kong → all backend services (HTTP + gRPC)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-to-backends
  namespace: ocr-platform
spec:
  podSelector:
    matchLabels:
      app: kong
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - auth-service
                  - ingestion-service
                  - quota-service
                  - result-service
                  - notification-service
                  - chat-service
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 50052
        - protocol: TCP
          port: 50053
        - protocol: TCP
          port: 50054
        - protocol: TCP
          port: 50055

---
# Backend services accept from Kong
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backends-from-kong
  namespace: ocr-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - auth-service
          - ingestion-service
          - quota-service
          - result-service
          - notification-service
          - chat-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kong
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 50052
        - protocol: TCP
          port: 50053
        - protocol: TCP
          port: 50054
        - protocol: TCP
          port: 50055

---
# ingestion-service → ClamAV, Kafka, MinIO/S3, MongoDB, quota-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingestion-egress
  namespace: ocr-platform
spec:
  podSelector:
    matchLabels:
      app: ingestion-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: clamav
      ports:
        - protocol: TCP
          port: 3310
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: quota-service
      ports:
        - protocol: TCP
          port: 50053

---
# ocr-worker → Triton (gRPC), Kafka, Redis, MongoDB, MinIO/S3
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ocr-worker-egress
  namespace: ocr-platform
spec:
  podSelector:
    matchLabels:
      app: ocr-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: triton
      ports:
        - protocol: TCP
          port: 8001
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017

---
# chat-service → OpenAI (external HTTPS), Ollama, MongoDB, Langfuse
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chat-egress
  namespace: ocr-platform
spec:
  podSelector:
    matchLabels:
      app: chat-service
  policyTypes:
    - Egress
  egress:
    # OpenAI API (external)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - protocol: TCP
          port: 11434
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: langfuse
      ports:
        - protocol: TCP
          port: 3000

---
# Triton — accept only from ocr-worker, no egress needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: triton-ingress
  namespace: ocr-platform
spec:
  podSelector:
    matchLabels:
      app: triton
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ocr-worker
      ports:
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8000
